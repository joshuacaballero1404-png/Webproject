<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskFlow — Task Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0f;
    --surface: #16161a;
    --surface2: #1e1e24;
    --border: #2a2a35;
    --accent: #c8ff57;
    --accent2: #ff6b6b;
    --accent3: #57c8ff;
    --text: #f0f0f5;
    --muted: #7a7a95;
    --radius: 14px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated background */
  body::before {
    content: '';
    position: fixed;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(ellipse at 20% 20%, rgba(200,255,87,0.05) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(87,200,255,0.04) 0%, transparent 50%);
    animation: bgPulse 8s ease-in-out infinite alternate;
    pointer-events: none;
    z-index: 0;
  }

  @keyframes bgPulse {
    0% { transform: scale(1) rotate(0deg); }
    100% { transform: scale(1.1) rotate(3deg); }
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 40px 20px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 48px;
    animation: slideDown 0.6s cubic-bezier(0.16, 1, 0.3, 1);
  }

  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-size: 2.4rem;
    font-weight: 800;
    letter-spacing: -1px;
    line-height: 1;
  }

  .logo span {
    color: var(--accent);
    position: relative;
  }

  .logo span::after {
    content: '';
    position: absolute;
    bottom: 2px;
    left: 0;
    width: 100%;
    height: 3px;
    background: var(--accent);
    border-radius: 2px;
  }

  .stats {
    display: flex;
    gap: 20px;
  }

  .stat {
    text-align: right;
  }

  .stat-num {
    font-family: 'Syne', sans-serif;
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
  }

  .stat-label {
    font-size: 0.7rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* Add Task Form */
  .add-form {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 32px;
    animation: slideUp 0.6s 0.1s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .form-title {
    font-family: 'Syne', sans-serif;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--muted);
    margin-bottom: 16px;
  }

  .form-row {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }

  .form-row input, .form-row select {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 10px;
    padding: 12px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .form-row input:focus, .form-row select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(200,255,87,0.1);
  }

  .input-task { flex: 1; min-width: 200px; }

  .form-row select option { background: var(--surface2); }

  .btn-add {
    background: var(--accent);
    color: #0d0d0f;
    border: none;
    border-radius: 10px;
    padding: 12px 24px;
    font-family: 'Syne', sans-serif;
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    white-space: nowrap;
  }

  .btn-add:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(200,255,87,0.3);
  }

  .btn-add:active { transform: translateY(0); }

  /* Filters */
  .filters {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    flex-wrap: wrap;
    animation: slideUp 0.6s 0.2s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  .filter-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 8px;
    padding: 8px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    cursor: pointer;
    transition: all 0.2s;
  }

  .filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #0d0d0f;
    font-weight: 600;
  }

  .filter-btn:not(.active):hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* Task list */
  .tasks-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }

  .tasks-title {
    font-family: 'Syne', sans-serif;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--muted);
  }

  .btn-clear {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 0.75rem;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
  }

  .btn-clear:hover {
    border-color: var(--accent2);
    color: var(--accent2);
  }

  #task-list { list-style: none; }

  .task-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 16px;
    transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s, border-color 0.2s;
    animation: taskIn 0.35s cubic-bezier(0.16, 1, 0.3, 1);
  }

  @keyframes taskIn {
    from { opacity: 0; transform: translateX(-12px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .task-item:hover {
    transform: translateX(4px);
    border-color: var(--border);
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }

  .task-item.done {
    opacity: 0.5;
    border-color: rgba(42,42,53,0.5);
  }

  .task-item.done .task-text {
    text-decoration: line-through;
    color: var(--muted);
  }

  .task-check {
    width: 22px;
    height: 22px;
    border-radius: 6px;
    border: 2px solid var(--border);
    cursor: pointer;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    background: transparent;
  }

  .task-check:hover { border-color: var(--accent); }

  .task-item.done .task-check {
    background: var(--accent);
    border-color: var(--accent);
  }

  .task-item.done .task-check::after {
    content: '✓';
    color: #0d0d0f;
    font-size: 13px;
    font-weight: 700;
  }

  .task-body { flex: 1; }

  .task-text {
    font-size: 0.95rem;
    font-weight: 500;
    line-height: 1.4;
    margin-bottom: 4px;
  }

  .task-meta {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .badge {
    font-size: 0.68rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    padding: 3px 8px;
    border-radius: 5px;
  }

  .badge-high { background: rgba(255,107,107,0.15); color: var(--accent2); }
  .badge-medium { background: rgba(255,200,87,0.15); color: #ffc857; }
  .badge-low { background: rgba(87,200,255,0.15); color: var(--accent3); }

  .badge-work { background: rgba(200,87,255,0.15); color: #c857ff; }
  .badge-personal { background: rgba(87,255,200,0.15); color: #57ffc8; }
  .badge-shopping { background: rgba(255,165,87,0.15); color: #ffa557; }
  .badge-other { background: rgba(150,150,180,0.15); color: var(--muted); }

  .task-date {
    font-size: 0.7rem;
    color: var(--muted);
  }

  .task-actions {
    display: flex;
    gap: 8px;
  }

  .btn-icon {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    width: 32px;
    height: 32px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.85rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }

  .btn-icon:hover { border-color: var(--accent2); color: var(--accent2); }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    animation: fadeIn 0.5s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .empty-icon { font-size: 3rem; margin-bottom: 12px; opacity: 0.4; }

  .empty p { font-size: 0.9rem; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 30px;
    right: 30px;
    background: var(--surface);
    border: 1px solid var(--accent);
    color: var(--text);
    padding: 14px 20px;
    border-radius: 10px;
    font-size: 0.85rem;
    box-shadow: 0 8px 30px rgba(0,0,0,0.4);
    transform: translateY(80px);
    opacity: 0;
    transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    z-index: 100;
  }

  .toast.show { transform: translateY(0); opacity: 1; }

  /* Progress bar */
  .progress-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 24px;
    margin-bottom: 28px;
    animation: slideUp 0.6s 0.15s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  .progress-label {
    display: flex;
    justify-content: space-between;
    margin-bottom: 10px;
    font-size: 0.8rem;
  }

  .progress-label span:first-child { color: var(--muted); }
  .progress-label span:last-child { color: var(--accent); font-weight: 600; }

  .progress-bar {
    height: 6px;
    background: var(--surface2);
    border-radius: 3px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent3));
    border-radius: 3px;
    transition: width 0.5s cubic-bezier(0.16, 1, 0.3, 1);
  }

  @media (max-width: 600px) {
    .logo { font-size: 1.8rem; }
    .form-row { flex-direction: column; }
    .stats { gap: 14px; }
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div>
      <div class="logo">Task<span>Flow</span></div>
      <div style="font-size:0.78rem;color:var(--muted);margin-top:6px;">Your personal task database</div>
    </div>
    <div class="stats">
      <div class="stat">
        <div class="stat-num" id="stat-total">0</div>
        <div class="stat-label">Total</div>
      </div>
      <div class="stat">
        <div class="stat-num" id="stat-done">0</div>
        <div class="stat-label">Done</div>
      </div>
    </div>
  </header>

  <!-- Progress -->
  <div class="progress-wrap">
    <div class="progress-label">
      <span>Overall Progress</span>
      <span id="progress-pct">0%</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>
  </div>

  <!-- Add Form -->
  <div class="add-form">
    <div class="form-title">➕ Add New Task</div>
    <div class="form-row">
      <input type="text" class="input-task" id="task-input" placeholder="What needs to be done?" />
      <select id="priority-select">
        <option value="medium">Medium Priority</option>
        <option value="high">High Priority</option>
        <option value="low">Low Priority</option>
      </select>
      <select id="category-select">
        <option value="work">Work</option>
        <option value="personal">Personal</option>
        <option value="shopping">Shopping</option>
        <option value="other">Other</option>
      </select>
      <button class="btn-add" onclick="addTask()">Add Task</button>
    </div>
  </div>

  <!-- Filters -->
  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
    <button class="filter-btn" onclick="setFilter('active', this)">Active</button>
    <button class="filter-btn" onclick="setFilter('done', this)">Completed</button>
    <button class="filter-btn" onclick="setFilter('high', this)">🔴 High</button>
    <button class="filter-btn" onclick="setFilter('work', this)">💼 Work</button>
    <button class="filter-btn" onclick="setFilter('personal', this)">👤 Personal</button>
  </div>

  <!-- Tasks -->
  <div class="tasks-header">
    <div class="tasks-title" id="tasks-label">All Tasks</div>
    <button class="btn-clear" onclick="clearCompleted()">Clear Completed</button>
  </div>

  <ul id="task-list"></ul>

</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  // ─── DATABASE (localStorage) ──────────────────────────────
  const DB_KEY = 'taskflow_db';

  function dbGet() {
    try {
      return JSON.parse(localStorage.getItem(DB_KEY)) || [];
    } catch { return []; }
  }

  function dbSave(tasks) {
    localStorage.setItem(DB_KEY, JSON.stringify(tasks));
  }

  function dbInsert(task) {
    const tasks = dbGet();
    tasks.unshift(task);
    dbSave(tasks);
  }

  function dbUpdate(id, changes) {
    const tasks = dbGet();
    const idx = tasks.findIndex(t => t.id === id);
    if (idx > -1) { Object.assign(tasks[idx], changes); dbSave(tasks); }
  }

  function dbDelete(id) {
    const tasks = dbGet().filter(t => t.id !== id);
    dbSave(tasks);
  }

  function dbClearDone() {
    dbSave(dbGet().filter(t => !t.done));
  }

  // ─── STATE ────────────────────────────────────────────────
  let currentFilter = 'all';

  // ─── ACTIONS ──────────────────────────────────────────────
  function addTask() {
    const input = document.getElementById('task-input');
    const priority = document.getElementById('priority-select').value;
    const category = document.getElementById('category-select').value;
    const text = input.value.trim();

    if (!text) {
      input.style.borderColor = 'var(--accent2)';
      setTimeout(() => input.style.borderColor = '', 1000);
      return;
    }

    const task = {
      id: Date.now().toString(),
      text,
      priority,
      category,
      done: false,
      createdAt: new Date().toLocaleDateString('en-US', { month:'short', day:'numeric' })
    };

    dbInsert(task);
    input.value = '';
    render();
    showToast('Task added ✓');
  }

  function toggleDone(id) {
    const task = dbGet().find(t => t.id === id);
    if (task) {
      dbUpdate(id, { done: !task.done });
      render();
    }
  }

  function deleteTask(id) {
    dbDelete(id);
    render();
    showToast('Task deleted');
  }

  function clearCompleted() {
    dbClearDone();
    render();
    showToast('Completed tasks cleared');
  }

  function setFilter(filter, btn) {
    currentFilter = filter;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  // ─── RENDER ───────────────────────────────────────────────
  function render() {
    const all = dbGet();

    // Stats
    const done = all.filter(t => t.done).length;
    document.getElementById('stat-total').textContent = all.length;
    document.getElementById('stat-done').textContent = done;
    const pct = all.length ? Math.round((done / all.length) * 100) : 0;
    document.getElementById('progress-pct').textContent = pct + '%';
    document.getElementById('progress-fill').style.width = pct + '%';

    // Filter
    let filtered = all;
    if (currentFilter === 'active') filtered = all.filter(t => !t.done);
    else if (currentFilter === 'done') filtered = all.filter(t => t.done);
    else if (['high','medium','low'].includes(currentFilter)) filtered = all.filter(t => t.priority === currentFilter);
    else if (['work','personal','shopping','other'].includes(currentFilter)) filtered = all.filter(t => t.category === currentFilter);

    const labels = {all:'All Tasks',active:'Active Tasks',done:'Completed',high:'High Priority',medium:'Medium Priority',low:'Low Priority',work:'Work',personal:'Personal',shopping:'Shopping',other:'Other'};
    document.getElementById('tasks-label').textContent = labels[currentFilter] || 'Tasks';

    const list = document.getElementById('task-list');

    if (filtered.length === 0) {
      list.innerHTML = `<li class="empty"><div class="empty-icon">📋</div><p>No tasks here. ${currentFilter === 'all' ? 'Add one above!' : 'Try another filter.'}</p></li>`;
      return;
    }

    list.innerHTML = filtered.map(task => `
      <li class="task-item ${task.done ? 'done' : ''}" id="task-${task.id}">
        <div class="task-check" onclick="toggleDone('${task.id}')"></div>
        <div class="task-body">
          <div class="task-text">${escHtml(task.text)}</div>
          <div class="task-meta">
            <span class="badge badge-${task.priority}">${task.priority}</span>
            <span class="badge badge-${task.category}">${task.category}</span>
            <span class="task-date">${task.createdAt}</span>
          </div>
        </div>
        <div class="task-actions">
          <button class="btn-icon" onclick="deleteTask('${task.id}')" title="Delete">✕</button>
        </div>
      </li>
    `).join('');
  }

  // ─── UTILS ────────────────────────────────────────────────
  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
  }

  // Enter key
  document.getElementById('task-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') addTask();
  });

  // ─── INIT ─────────────────────────────────────────────────
  render();
</script>
</body>
</html>
